<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - Bangka Lens & Edit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-indigo-600 min-h-screen flex items-center justify-center p-4">

    <!-- Card Container -->
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
        
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-full translate-x-1/2 -translate-y-1/2"></div>
        
        <div class="relative z-10">
            <div class="text-center mb-10">
                <a href="index.html" class="text-3xl font-bold text-indigo-600 mb-2 block">BangkaLens</a>
                <p class="text-slate-500 font-medium">Selamat datang kembali di ekosistem kreatif Bangka.</p>
            </div>

            <!-- Tabs -->
            <div class="flex p-1.5 bg-slate-100 rounded-2xl mb-8">
                <button id="login-tab" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm">Masuk</button>
                <button id="register-tab" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700">Daftar</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                        <input type="email" placeholder="name@email.com" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-bold text-slate-700">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:underline">Lupa Password?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                        <input type="password" placeholder="••••••••" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 active:scale-95">Masuk Sekarang</button>
            </form>

            <!-- Register Form (Hidden) -->
            <form id="register-form" class="hidden space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Pilih Peran Anda</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" class="peer hidden" checked>
                            <div class="p-3 text-center border border-slate-200 rounded-xl font-bold text-slate-500 text-sm peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all">Penjasa</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" class="peer hidden">
                            <div class="p-3 text-center border border-slate-200 rounded-xl font-bold text-slate-500 text-sm peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all">Pelanggan</div>
                        </label>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Nama Lengkap</label>
                    <input type="text" placeholder="John Doe" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Email</label>
                    <input type="email" placeholder="name@email.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 active:scale-95">Buat Akun</button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 text-sm">Kembali ke <a href="index.html" class="text-indigo-600 font-bold hover:underline">Halaman Utama</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        loginTab.addEventListener('click', () => {
            loginTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm';
            registerTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700';
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        registerTab.addEventListener('click', () => {
            registerTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm';
            loginTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all text-slate-500 hover:text-slate-700';
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });
    </script>
</body>
</html>
