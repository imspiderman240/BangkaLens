<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - Bangka Lens & Edit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 py-12 relative">

    <!-- BACKGROUND WRAPPER -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <img src="https://images.unsplash.com/photo-1452587925148-ce544e77e70d?auto=format&fit=crop&q=80&w=1920" 
             alt="Background" 
             class="w-full h-full object-cover opacity-60">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/80 via-indigo-900/60 to-slate-900/90 backdrop-blur-[6px]"></div>
    </div>

    <!-- Card Container -->
    <div class="bg-white/10 backdrop-blur-2xl w-full max-w-lg rounded-[2.5rem] p-10 md:p-14 shadow-2xl relative border border-white/10 z-10">
        
        <div class="relative z-10">
            <div class="text-center mb-12">
                <a href="index.html" class="text-4xl font-extrabold text-white mb-3 block tracking-tight">Bangka<span class="text-indigo-400">Lens</span></a>
                <p class="text-white/50 font-medium leading-relaxed">Selamat datang kembali di ekosistem kreatif Bangka.</p>
            </div>

            <!-- Tabs -->
            <div class="flex p-1.5 bg-white/5 rounded-2xl mb-10 border border-white/5">
                <button id="login-tab" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white text-slate-900 shadow-xl hover:-translate-y-1 active:scale-95">Masuk</button>
                <button id="register-tab" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-white/40 hover:text-white/70 hover:-translate-y-1 active:scale-95">Daftar</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-8">
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Email Address</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 text-white/20 w-5 h-5 group-focus-within:text-indigo-400 transition-colors"></i>
                        <input type="email" placeholder="name@email.com" class="w-full pl-14 pr-5 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white placeholder:text-white/20">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 transition-colors">Lupa Password?</a>
                    </div>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 text-white/20 w-5 h-5 group-focus-within:text-indigo-400 transition-colors"></i>
                        <input type="password" placeholder="••••••••" class="w-full pl-14 pr-5 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white placeholder:text-white/20">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-indigo-500 transition-all duration-300 shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-1 active:scale-95">Masuk Sekarang</button>
            </form>

            <!-- Register Form (Hidden) -->
            <form id="register-form" class="hidden space-y-8">
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Pilih Peran Anda</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" class="peer hidden" checked>
                            <div class="p-4 text-center border border-white/10 bg-white/5 rounded-xl font-bold text-white/40 text-sm peer-checked:bg-white peer-checked:text-slate-900 transition-all">Penjasa</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" class="peer hidden">
                            <div class="p-4 text-center border border-white/10 bg-white/5 rounded-xl font-bold text-white/40 text-sm peer-checked:bg-white peer-checked:text-slate-900 transition-all">Pelanggan</div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Nama Lengkap</label>
                    <input type="text" placeholder="John Doe" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white placeholder:text-white/20">
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Email</label>
                    <input type="email" placeholder="name@email.com" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white placeholder:text-white/20">
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-white/40 uppercase tracking-widest">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white placeholder:text-white/20">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-indigo-500 transition-all duration-300 shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-1 active:scale-95">Buat Akun</button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-white/30 text-sm">Kembali ke <a href="index.html" class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors underline-offset-4 hover:underline">Halaman Utama</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        loginTab.addEventListener('click', () => {
            loginTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-xl';
            registerTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all text-white/40 hover:text-white/70';
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        registerTab.addEventListener('click', () => {
            registerTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-xl';
            loginTab.className = 'flex-1 py-3 text-sm font-bold rounded-xl transition-all text-white/40 hover:text-white/70';
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });
    </script>
    <script type="module" src="/chatbot.js"></script>
</body>
</html>
